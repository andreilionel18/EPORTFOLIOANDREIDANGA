<!DOCTYPE html>
<html>
<head>
<title>TLE Lesson</title>
<link rel="stylesheet" href="style.css">
<style>
body {
background: url('TLEbg.jpg') center 35% / cover no-repeat fixed;
}

.photo-row{display:flex;justify-content:space-between;width:100%;}
.photo-box{flex:1;background:rgba(255,255,255,0.2);border-radius:10px;overflow:hidden;display:flex;flex-direction:column;align-items:center;padding:10px;}
.photo-box img{width:100%;height:auto;border-radius:10px;border:3px solid rgba(255,255,255,0.3);box-sizing:border-box;cursor:pointer;}
.photo-box p{margin-top:10px;font-size:14px;color:#f0f0f0;text-align:justify;line-height:1.5;}

#popup{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);display:none;justify-content:center;align-items:center;z-index:9999;}
#popup img{max-width:80%;max-height:80%;border-radius:10px;}
#close{position:absolute;top:20px;right:30px;font-size:35px;color:white;cursor:pointer;}
</style>
</head>
<body>

<div class="navbar flex">
<nav class="flex">
<h1>E-PORTFOLIO</h1>
<ul class="flex">
<li><a href="index.html">HOME</a></li>
<li><a href="tle.html" class="active">TLE</a></li>
<li><a href="events.html">EVENTS</a></li>
<li><a href="AP.html">AP</a></li>
</ul>
</nav>
</div>

<div class="textbox">
<h2>Lesson: Pop-up boxes!</h2>

<div class="photo-row">
<div class="photo-box">
<img src="pop.png" onclick="confirmPopup(this.src)">
</div>
</div>

<p>This webpage uses Popupboxes. They are windows that appear before a page loads, events, or page exits, serving as warnings, prompts, or confirmation boxes. The popup box used is a Confirm Box, try clicking the image!</p>
</div>

<div id="popup">
<span id="close" onclick="closePopup()">×</span>
<img id="popupimg">
</div>

<script>
function confirmPopup(src){
if(confirm("Do you want to view this image?")){
document.getElementById("popupimg").src=src;
document.getElementById("popup").style.display="flex";
}
}

function closePopup(){
document.getElementById("popup").style.display="none";
}
</script>

</body>
</html>
